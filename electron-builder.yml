appId: com.meckodo.reunion
productName: Reunion
copyright: Copyright (c) 2026 MeCKodo
asar: true

directories:
  output: release
  buildResources: build

# Hook used to ad-hoc sign the entire .app bundle after packaging.
# electron-builder's `identity: null` skips signing completely, so Apple
# Silicon Gatekeeper rejects the app with "no resources but signature
# indicates they must be present". The hook fixes that for free.
afterPack: scripts/after-pack.cjs

# Files included inside app.asar.
# We only ship the compiled backend / electron main and the production
# node_modules. The frontend build output is shipped via extraResources
# instead so it can be served as plain static assets at runtime.
files:
  - dist/**/*
  - package.json
  - "!**/*.map"
  - "!**/{.DS_Store,Thumbs.db}"
  - "!frontend/**/*"
  - "!data/**/*"
  - "!static/**/*"
  - "!release/**/*"
  - "!**/*.tsbuildinfo"
  - "!{tsconfig*.json,electron-builder.yml,*.html,*.py}"
  - "!{AGENTS.md,README.md,QUICK_START_DMG.md,FIRST_OPEN.md}"
  - "!.cursor/**/*"
  - "!.git/**/*"

# Static assets shipped outside app.asar so the embedded HTTP server can
# read them with plain fs at runtime via process.resourcesPath.
extraResources:
  - from: frontend/dist
    to: frontend/dist
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # ad-hoc sign on the local machine. No Apple Developer account needed.
  # When upgrading to paid signing, set:
  #   identity: "Developer ID Application: <Your Company> (TEAMID)"
  #   hardenedRuntime: true
  #   entitlements: build/entitlements.mac.plist
  #   entitlementsInherit: build/entitlements.mac.plist
  #   notarize:
  #     teamId: TEAMID
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  # We ship two single-arch DMGs (arm64 + x64) instead of one universal
  # build because the universal merger is sensitive to extraResources
  # discrepancies between the two arch packagings. arm64 covers ~95%+ of
  # current internal Macs; x64 is provided as a fallback.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  title: ${productName} ${version}
  icon: build/icon.icns
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications

# ---------------------------------------------------------------------------
# Windows
# ---------------------------------------------------------------------------
# We ship two Windows artifacts:
#   - NSIS installer (Reunion-Setup-<version>.exe)        — standard Windows
#                                                          install/uninstall
#                                                          flow with Start Menu
#                                                          + Desktop shortcuts.
#   - Portable      (Reunion-<version>-portable.exe)      — single .exe, no
#                                                          install required, runs
#                                                          from anywhere.
# Both are unsigned (no SmartScreen-bypassing EV cert), so first launch will
# trigger a "Windows protected your PC" dialog — users click "More info" ->
# "Run anyway". Document this in FIRST_OPEN_WINDOWS.md.
win:
  icon: build/icon.ico
  # Match the macOS strategy: ship two arch-specific installers instead of one
  # universal one. x64 covers >99% of Windows PCs; arm64 is opt-in for Snapdragon
  # devices and is built only when explicitly requested via `dist:win:arm64`.
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Don't waste a re-sign step on Windows; we have no certificate.
  signAndEditExecutable: false
  # Lets users run the portable exe without UAC elevation.
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  uninstallDisplayName: ${productName} ${version}
  # Wipe %APPDATA%\Reunion when the user explicitly chooses "remove app data"
  # in the uninstaller. Default uninstall keeps user data so re-install is
  # idempotent.
  deleteAppDataOnUninstall: false

portable:
  artifactName: ${productName}-${version}-${arch}-portable.${ext}
  # Portable build also writes user data into %APPDATA%\Reunion so it stays
  # consistent with the installed version (instead of next-to-the-exe). This
  # matches Electron's app.getPath('userData') default.
  unpackDirName: false

# Disable update server probing for the local-only build.
publish: null
