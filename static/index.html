<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 74 74'><rect x='0' y='0' width='66' height='66' rx='16' fill='%23fbfaf7'/><path d='M18 15h24c7 0 12 5 12 12v23H30c-7 0-12-5-12-12V15Z' fill='%235a4f7b'/><path d='M10 24h24c7 0 12 5 12 12v14H22c-7 0-12-5-12-12V24Z' fill='%23e08454'/><path d='M23 19h17c6 0 10 4 10 10v17H33c-6 0-10-4-10-10V19Z' fill='%2323202d'/><circle cx='37' cy='33' r='5' fill='%23fbfaf7'/></svg>"
    />
    <title>Reunion</title>
    <style>
      :root {
        --bg: #0c1018;
        --panel: #141b26;
        --panel-2: #101722;
        --text: #e9eef7;
        --muted: #94a3b8;
        --line: #243041;
        --accent: #5aa2ff;
        --accent-soft: #1c2d47;
        --ok: #7adba6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% -10%, #1a2a44, #0c1018 36%, #0b1119 100%);
      }
      .wrap {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .toolbar {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(11, 17, 25, 0.88);
        backdrop-filter: blur(8px);
        display: flex;
        gap: 8px;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      input, select, button {
        border: 1px solid var(--line);
        background: #111a27;
        color: var(--text);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 14px;
      }
      input { width: 360px; }
      button.primary {
        background: var(--accent);
        color: #0b1220;
        border-color: var(--accent);
        font-weight: 600;
      }
      button:hover { opacity: 0.92; }
      .layout {
        display: grid;
        grid-template-columns: 42% 58%;
        height: calc(100vh - 58px);
      }
      .left, .right {
        overflow: auto;
        padding: 14px;
      }
      .left {
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(12, 17, 26, 0.96), rgba(11, 15, 23, 0.96));
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: border-color 0.16s ease, transform 0.12s ease, background 0.16s ease;
      }
      .card:hover {
        border-color: #3f5f8e;
        transform: translateY(-1px);
        background: #172131;
      }
      .card.active {
        border-color: var(--accent);
        background: #1a2a43;
      }
      .repo {
        display: inline-block;
        font-size: 12px;
        color: #b8d5ff;
        background: #22344f;
        border-radius: 999px;
        padding: 2px 8px;
      }
      .meta {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .snippet {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.5;
        color: #d8e2f0;
      }
      .actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
      }
      .mini-btn {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 8px;
        cursor: pointer;
        background: var(--accent-soft);
        border-color: #32507a;
      }
      .mini-btn:hover { border-color: var(--accent); }
      mark {
        background: #ffce66;
        color: #2a1d00;
        border-radius: 4px;
        padding: 0 2px;
      }
      pre {
        background: var(--panel-2);
        color: #e5eefb;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.45;
        font-size: 13px;
        margin-top: 8px;
      }
      .muted { color: var(--muted); }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.2px;
        margin-right: 10px;
        color: #f3ebde;
      }
      .logo svg {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="toolbar">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 74 74" xmlns="http://www.w3.org/2000/svg" aria-label="Reunion">
            <rect x="0" y="0" width="66" height="66" rx="16" fill="#fbfaf7"/>
            <path d="M18 15h24c7 0 12 5 12 12v23H30c-7 0-12-5-12-12V15Z" fill="#5a4f7b"/>
            <path d="M10 24h24c7 0 12 5 12 12v14H22c-7 0-12-5-12-12V24Z" fill="#e08454"/>
            <path d="M23 19h17c6 0 10 4 10 10v17H33c-6 0-10-4-10-10V19Z" fill="#23202d"/>
            <circle cx="37" cy="33" r="5" fill="#fbfaf7"/>
          </svg>
          Reunion
        </div>
        <input id="q" placeholder="" />
        <select id="repo"></select>
        <select id="days"></select>
        <button class="primary" id="searchBtn"></button>
        <button id="reindexBtn"></button>
        <span class="muted" id="status"></span>
      </div>

      <div class="layout">
        <div class="left" id="results"></div>
        <div class="right">
          <div id="detailMeta" class="muted"></div>
          <pre id="detail"></pre>
        </div>
      </div>
    </div>

    <script>
      const LANG = (() => {
        try {
          const stored = localStorage.getItem("reunion:language");
          if (stored === "en" || stored === "zh") return stored;
        } catch {}
        return (navigator.language || "").startsWith("zh") ? "zh" : "en";
      })();
      document.documentElement.lang = LANG === "zh" ? "zh-CN" : "en";

      const I18N = {
        en: {
          searchPlaceholder: "Search keywords",
          allTime: "All time",
          last7: "Last 7 days",
          last30: "Last 30 days",
          last60: "Last 60 days",
          last90: "Last 90 days",
          search: "Search",
          reindex: "Reindex",
          allRepo: "All Repos",
          searching: "Searching...",
          resultCount: (n) => `${n} result(s)`,
          noResults: "No matching results",
          openFile: "Open source file",
          sessionFailed: "Failed to load session",
          indexing: "Building index...",
          indexFailed: (e) => `Index failed: ${e}`,
          indexDone: (n) => `Indexed: ${n} sessions`,
          openFailed: (e) => `Open failed: ${e}`,
          opened: "Source file opened",
          detailHint: "Click a session on the left to view details",
        },
        zh: {
          searchPlaceholder: "搜索关键词（支持中英文）",
          allTime: "全部时间",
          last7: "最近7天",
          last30: "最近30天",
          last60: "最近60天",
          last90: "最近90天",
          search: "搜索",
          reindex: "重建索引",
          allRepo: "全部 Repo",
          searching: "查询中...",
          resultCount: (n) => `结果 ${n} 条`,
          noResults: "没有匹配结果",
          openFile: "打开原文件",
          sessionFailed: "会话读取失败",
          indexing: "索引构建中...",
          indexFailed: (e) => `索引失败：${e}`,
          indexDone: (n) => `索引完成：${n} sessions`,
          openFailed: (e) => `打开失败：${e}`,
          opened: "已打开原文件",
          detailHint: "点击左侧会话查看详情",
        },
      };
      const t = I18N[LANG];

      // Apply i18n to static DOM
      document.getElementById("q").placeholder = t.searchPlaceholder;
      const daysEl = document.getElementById("days");
      daysEl.innerHTML = "";
      [[0, t.allTime],[7, t.last7],[30, t.last30],[60, t.last60],[90, t.last90]].forEach(([v, label]) => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = label;
        daysEl.appendChild(opt);
      });
      document.getElementById("searchBtn").textContent = t.search;
      document.getElementById("reindexBtn").textContent = t.reindex;
      document.getElementById("detailMeta").textContent = t.detailHint;

      const qEl = document.getElementById("q");
      const repoEl = document.getElementById("repo");
      const resultsEl = document.getElementById("results");
      const detailEl = document.getElementById("detail");
      const detailMetaEl = document.getElementById("detailMeta");
      const statusEl = document.getElementById("status");
      let activeSessionKey = "";

      function fmtTs(ts) {
        if (!ts) return "-";
        return new Date(ts * 1000).toLocaleString();
      }

      async function loadRepos() {
        const res = await fetch("/api/repos");
        const data = await res.json();
        repoEl.innerHTML = "";

        const all = document.createElement("option");
        all.value = "";
        all.textContent = t.allRepo;
        repoEl.appendChild(all);

        for (const item of data.repos) {
          const opt = document.createElement("option");
          opt.value = item.repo;
          opt.textContent = `${item.repo} (${item.session_count})`;
          repoEl.appendChild(opt);
        }
      }

      async function search() {
        statusEl.textContent = t.searching;
        const q = encodeURIComponent(qEl.value.trim());
        const repo = encodeURIComponent(repoEl.value);
        const days = encodeURIComponent(daysEl.value || "0");
        const res = await fetch(`/api/search?q=${q}&repo=${repo}&days=${days}&limit=200`);
        const data = await res.json();
        renderResults(data.results || []);
        statusEl.textContent = t.resultCount(data.count || 0);
      }

      function renderResults(items) {
        resultsEl.innerHTML = "";
        if (!items.length) {
          resultsEl.innerHTML = `<p class="muted">${t.noResults}</p>`;
          return;
        }

        for (const item of items) {
          const card = document.createElement("div");
          card.className = "card";
          if (item.session_key === activeSessionKey) {
            card.classList.add("active");
          }
          card.innerHTML = `
            <div><span class="repo">${item.repo}</span></div>
            <div class="meta">${item.session_id} · ${fmtTs(item.updated_at)}</div>
            <div class="snippet">${item.snippet || ""}</div>
            <div class="actions">
              <button class="mini-btn open-file-btn" data-session-key="${item.session_key}">${t.openFile}</button>
            </div>
          `;
          card.addEventListener("click", () => openSession(item.session_key));
          const openBtn = card.querySelector(".open-file-btn");
          openBtn.addEventListener("click", async (event) => {
            event.stopPropagation();
            await openSourceFile(item.session_key);
          });
          resultsEl.appendChild(card);
        }
      }

      async function openSession(sessionKey) {
        activeSessionKey = sessionKey;
        const res = await fetch(`/api/session/${encodeURIComponent(sessionKey)}`);
        if (!res.ok) {
          detailMetaEl.textContent = t.sessionFailed;
          detailEl.textContent = "";
          return;
        }
        const item = await res.json();
        detailMetaEl.textContent = `${item.repo} · ${item.session_id} · ${fmtTs(item.updated_at)} · ${item.file_path}`;
        detailEl.textContent = item.content || "";
        await search();
      }

      async function reindex() {
        statusEl.textContent = t.indexing;
        const res = await fetch("/api/reindex", { method: "POST" });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          statusEl.textContent = t.indexFailed(data.error || "unknown");
          return;
        }
        statusEl.textContent = t.indexDone(data.stats.sessions_indexed);
        await loadRepos();
        await search();
      }

      async function openSourceFile(sessionKey) {
        const res = await fetch(`/api/open-file/${encodeURIComponent(sessionKey)}`, { method: "POST" });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          statusEl.textContent = t.openFailed(data.error || "unknown");
          return;
        }
        statusEl.textContent = t.opened;
      }

      document.getElementById("searchBtn").addEventListener("click", search);
      document.getElementById("reindexBtn").addEventListener("click", reindex);
      daysEl.addEventListener("change", search);
      repoEl.addEventListener("change", search);
      qEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") search();
      });

      (async function boot() {
        await loadRepos();
        await search();
      })();
    </script>
  </body>
</html>
