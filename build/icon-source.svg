<?xml version="1.0" encoding="UTF-8"?>
<!--
  Reunion · macOS App Icon (1024×1024) · Twilight Ember
  Transparent background — only the mark geometry.
  macOS applies its own squircle mask.

  Tokens (oklch):
    layer-back   = oklch(42% 0.06 280) (purple mist)
    layer-mid    = oklch(68% 0.16 35)  (twilight ember)
    layer-front  = oklch(95% 0.015 60) (warm near-white)
    focal-dot    = oklch(22% 0.04 280) (deep ink)

  Mark bounding box in 84×84 coords: x(14..72) y(14..72) → 58×58
  Scale 13× ≈ 754×754 → centered in 1024 with comfortable padding.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="layerShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Original mark lives in 84×84 space, shapes span x(14..72) y(14..72).
    Center: (43, 43). Scale=13 → translate to center in 1024:
      offsetX = 512 - 43*13 = 512 - 559 = -47
      offsetY = 512 - 43*13 = 512 - 559 = -47
  -->
  <g transform="translate(-47,-47) scale(13)" filter="url(#layerShadow)">
    <rect x="14" y="14" width="50" height="50" rx="14" fill="oklch(42% 0.06 280)" opacity="0.7"/>
    <rect x="22" y="22" width="50" height="50" rx="14" fill="oklch(68% 0.16 35)" opacity="0.94"/>
    <rect x="30" y="30" width="34" height="34" rx="9" fill="oklch(95% 0.015 60)"/>
    <circle cx="47" cy="47" r="6" fill="oklch(22% 0.04 280)"/>
  </g>
</svg>
