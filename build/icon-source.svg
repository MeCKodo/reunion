<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bubbleA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bubbleB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- decorative grid -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- assistant bubble -->
  <g filter="url(#glow)">
    <path d="M180 320 Q180 240 260 240 L640 240 Q720 240 720 320 L720 480 Q720 560 640 560 L380 560 L260 660 L260 560 Q180 560 180 480 Z"
          fill="url(#bubbleA)" />
  </g>

  <!-- user bubble overlay -->
  <g filter="url(#glow)">
    <path d="M380 540 Q380 460 460 460 L820 460 Q900 460 900 540 L900 700 Q900 780 820 780 L640 780 L520 880 L520 780 L460 780 Q380 780 380 700 Z"
          fill="url(#bubbleB)"/>
  </g>

  <!-- spark / cursor mark -->
  <g fill="#fde68a">
    <circle cx="820" cy="220" r="14"/>
    <circle cx="880" cy="280" r="10"/>
    <circle cx="780" cy="280" r="8"/>
  </g>
</svg>
