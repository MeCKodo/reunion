<?xml version="1.0" encoding="UTF-8"?>
<!--
  Reunion · Twilight Ember mark
  Style: Layered Prism — stacked rounded rectangles with focal dot
  Layer order:
    1 back     · oklch(42% 0.06 280) (purple mist, semi-transparent)
    2 mid      · oklch(68% 0.16 35)  (twilight ember amber)
    3 front    · oklch(95% 0.015 60) (warm near-white)
    4 focus    · oklch(22% 0.04 280) (deep ink dot)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 84" width="84" height="84">
  <rect x="14" y="14" width="50" height="50" rx="14" fill="oklch(42% 0.06 280)" opacity="0.7"/>
  <rect x="22" y="22" width="50" height="50" rx="14" fill="oklch(68% 0.16 35)" opacity="0.94"/>
  <rect x="30" y="30" width="34" height="34" rx="9" fill="oklch(95% 0.015 60)"/>
  <circle cx="47" cy="47" r="6" fill="oklch(22% 0.04 280)"/>
</svg>
